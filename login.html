<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Portafolio Académico</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Page Loader -->
    <div id="pageLoader">
        <div class="loader-spinner"></div>
        <h2 style="color: var(--text-color); font-weight: 500; font-size: 1.2rem; letter-spacing: 2px;">Cargando...</h2>
    </div>


    <!-- Navbar -->
    <nav class="navbar animate-fade-in">
        <a href="./index.html" class="logo">
            <img src="https://upla.edu.pe/web/wp-content/uploads/2024/10/logo-8.png" alt="UPLA Logo"
                style="height: 40px; margin-right: 10px;">
            Mi Portafolio
        </a>
        <ul class="nav-links">
            <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-home"></i> Volver al Inicio</a>
            </li>
        </ul>
    </nav>

    <main style="display: flex; align-items: center; justify-content: center; min-height: 80vh; padding-top: 80px;">
        <div class="form-container animate-slide-up" style="width: 100%;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fas fa-user-circle"
                    style="font-size: 4rem; color: var(--accent-color); margin-bottom: 1rem;"></i>
                <h2>Acceso Administrativo</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">Ingresa tus credenciales
                    para gestionar el portafolio</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="user"><i class="fas fa-user"></i> Usuario</label>
                    <input type="text" id="user" class="form-control" placeholder="Ej: admin" required
                        autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="pass"><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="pass" class="form-control" placeholder="Ingresa tu contraseña" required
                        autocomplete="current-password">
                </div>

                <p id="errorMsg" class="error-msg"><i class="fas fa-exclamation-triangle"></i> Usuario o contraseña
                    incorrectos.</p>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; margin-top: 1.5rem; font-size: 1.1rem;">
                    Ingresar <i class="fas fa-sign-in-alt" style="margin-left: 0.5rem;"></i>
                </button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
